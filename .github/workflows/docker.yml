name: Docker CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/pet-backend:latest ./server

      - name: Push backend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/pet-backend:latest

      - name: Build frontend image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/pet-frontend:latest ./client

      - name: Push frontend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/pet-frontend:latest